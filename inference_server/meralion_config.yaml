training:
  hidden_dim: 64
  projection_dim: 64
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  learning_rate: 0.001
  weight_decay: 0.00001
  epochs: 100
  lambda_offdiag: 0.005
  mask_ratio: 0.2
  noise_std: 0.01
  seed: 42

data:
  timestamp_col: timestamp
  household_col: household_id
  sensor_col: sensor_id
  sensor_value_col: sensor_raw_values 
  temporal_window: dweeky
  transition_max_gap_minutes: 90

alert:
  target_alert_rate: 0.07
  calibration_ratio: 0.5
  anomaly_metric: cosine
